# SecretProviderClass pulls all secrets from Azure Key Vault via the CSI driver.
# Replace KEYVAULT_NAME, AZURE_TENANT_ID, and AZURE_CLIENT_ID after infra deployment.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cognitops-kv-secrets
  namespace: cognitops
spec:
  provider: azure
  secretObjects:
    - secretName: cognitops-secrets
      type: Opaque
      data:
        - objectName: azure-openai-key
          key: AZURE_OPENAI_KEY
        - objectName: azure-search-key
          key: AZURE_SEARCH_KEY
        - objectName: cosmos-key
          key: COSMOS_KEY
        - objectName: storage-key
          key: STORAGE_KEY
        - objectName: servicebus-connection
          key: SERVICE_BUS_CONNECTION
  parameters:
    usePodIdentity: "false"
    clientID: "__AZURE_CLIENT_ID__"
    keyvaultName: "__KEYVAULT_NAME__"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: azure-openai-key
          objectType: secret
        - |
          objectName: azure-search-key
          objectType: secret
        - |
          objectName: cosmos-key
          objectType: secret
        - |
          objectName: storage-key
          objectType: secret
        - |
          objectName: servicebus-connection
          objectType: secret
    tenantId: "__AZURE_TENANT_ID__"
