# Workload identity service account — bound to a managed identity via federated credential
# Replace AZURE_CLIENT_ID and AZURE_TENANT_ID after infra deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cognitops-workload-sa
  namespace: cognitops
  annotations:
    azure.workload.identity/client-id: "__AZURE_CLIENT_ID__"
    azure.workload.identity/tenant-id: "__AZURE_TENANT_ID__"
  labels:
    azure.workload.identity/use: "true"
