# Non-secret environment config shared by all services.
# Replace __VALUES__ after infra deployment (scripts/deploy.ps1 writes these automatically).
apiVersion: v1
kind: ConfigMap
metadata:
  name: cognitops-config
  namespace: cognitops
data:
  AZURE_OPENAI_ENDPOINT:          "__AZURE_OPENAI_ENDPOINT__"
  AZURE_OPENAI_DEPLOYMENT_GPT4O:  "gpt-4o"
  AZURE_OPENAI_DEPLOYMENT_EMBEDDING: "text-embedding-3-large"
  AZURE_AI_SEARCH_ENDPOINT:       "__AZURE_AI_SEARCH_ENDPOINT__"
  AZURE_COSMOS_ENDPOINT:          "__AZURE_COSMOS_ENDPOINT__"
  AZURE_STORAGE_ACCOUNT_NAME:     "__AZURE_STORAGE_ACCOUNT_NAME__"
  AZURE_SERVICE_BUS_NAMESPACE:    "__AZURE_SERVICE_BUS_NAMESPACE__"
  AZURE_KEY_VAULT_ENDPOINT:       "__AZURE_KEY_VAULT_ENDPOINT__"
  APPLICATIONINSIGHTS_CONNECTION_STRING: "__APPLICATIONINSIGHTS_CONNECTION_STRING__"
  AZURE_MLFLOW_TRACKING_URI:      "__AZURE_MLFLOW_TRACKING_URI__"
  ORCHESTRATOR_URL:               "http://orchestrator:8000"
  RAG_SERVICE_URL:                "http://rag-service:8001"
  DIAGNOSTIC_ENGINE_URL:          "http://diagnostic-engine:8002"
  SEVERITY_SCORER_URL:            "http://severity-scorer:8003"
  REPORT_GENERATOR_URL:           "http://report-generator:8004"
  SUPERVISOR_API_URL:             "http://supervisor-api:8005"
