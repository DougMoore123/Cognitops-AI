apiVersion: apps/v1
kind: Deployment
metadata:
  name: severity-scorer
  namespace: cognitops
  labels:
    app: severity-scorer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: severity-scorer
  template:
    metadata:
      labels:
        app: severity-scorer
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: cognitops-workload-sa
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cognitops-kv-secrets
      containers:
        - name: severity-scorer
          image: __ACR_LOGIN_SERVER__/cognitops/severity-scorer:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: cognitops-config
            - secretRef:
                name: cognitops-secrets
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: severity-scorer
  namespace: cognitops
spec:
  selector:
    app: severity-scorer
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: severity-scorer-hpa
  namespace: cognitops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: severity-scorer
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
